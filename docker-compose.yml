services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://api:3005
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3005}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3005}
      - NEXT_PUBLIC_PLATFORM_NAME=Camp Alborz
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      - NEXT_PUBLIC_ENABLE_DONATIONS=${NEXT_PUBLIC_ENABLE_DONATIONS:-true}
      - NEXT_PUBLIC_ENABLE_APPLICATIONS=${NEXT_PUBLIC_ENABLE_APPLICATIONS:-true}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DATABASE_URL=${DATABASE_URL:-postgresql://campalborz:campalborz@db:5432/campalborz}
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL:-https://campalborz.org}
      - EMAIL_FROM=${EMAIL_FROM:-Camp Alborz <noreply@campalborz.org>}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-campalborz}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-campalborz}
      - POSTGRES_DB=${POSTGRES_DB:-campalborz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campalborz}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
